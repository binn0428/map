name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Load Supabase Config
        run: |
          if [ -n "${INPUT_SUPABASE:-}" ]; then
            printf "%s\n" "$INPUT_SUPABASE" >> "$GITHUB_ENV"
          fi

          if [ -z "${VITE_SUPABASE_URL:-}" ] && [ -n "${INPUT_SUPABASE_URL:-}" ]; then
            printf "%s\n" "VITE_SUPABASE_URL=$INPUT_SUPABASE_URL" >> "$GITHUB_ENV"
          fi

          if [ -z "${VITE_SUPABASE_ANON_KEY:-}" ] && [ -n "${INPUT_SUPABASE_ANON_KEY:-}" ]; then
            printf "%s\n" "VITE_SUPABASE_ANON_KEY=$INPUT_SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
          fi
        env:
          INPUT_SUPABASE: ${{ secrets.SUPABASE || vars.SUPABASE }}
          INPUT_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || vars.SUPABASE_URL }}
          INPUT_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}

      - name: Validate Supabase Env
        run: |
          node -e "['VITE_SUPABASE_URL','VITE_SUPABASE_ANON_KEY'].forEach(k=>{if(!process.env[k]){console.error('Missing '+k);process.exit(1)}})"
          node -e "console.log('VITE_SUPABASE_URL present:', !!process.env.VITE_SUPABASE_URL); console.log('VITE_SUPABASE_ANON_KEY present:', !!process.env.VITE_SUPABASE_ANON_KEY)"
          node -e "require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, `### Supabase env\\n- VITE_SUPABASE_URL present: ${!!process.env.VITE_SUPABASE_URL}\\n- VITE_SUPABASE_ANON_KEY present: ${!!process.env.VITE_SUPABASE_ANON_KEY}\\n`)"

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
